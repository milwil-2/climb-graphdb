# CI quality gate for climb-graphdb
#
# NOTE: No live Neo4j or Supabase connections are made in CI.
#       All graph and DB interactions are exercised via pytest fixtures only.
#
# Jobs:
#   quality  — lint, type-check, security scans, tests, isolation guards
#   gitleaks — dedicated secret-scanning job (runs independently)

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Primary quality gate ────────────────────────────────────────────────────
  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history needed for gitleaks in the main job

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # ── Lint & format ──────────────────────────────────────────────────────
      - name: ruff format --check
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check .

      # ── Type checking ──────────────────────────────────────────────────────
      - name: mypy
        run: uv run mypy src

      # ── Security scans ─────────────────────────────────────────────────────
      # B101 (assert_used) is skipped: the asserts in sync/ are intentional
      # type-narrowing on trusted internal data, not security gates. All other
      # bandit checks run at full severity (policy: fail on real findings).
      - name: bandit
        run: uv run bandit -r src api sync -s B101

      - name: pip-audit
        run: uv run pip-audit

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: pytest
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=85

      # ── Isolation guard ────────────────────────────────────────────────────
      # Fails the build if any file under src/, sync/, or api/ tries to import
      # the sibling projects climbing_elo or knowledge_graph.
      # This project must be fully self-contained and NEVER depend on those.
      - name: Isolation guard
        run: |
          ! grep -rnE "^(from|import) (climbing_elo|knowledge_graph)" src api sync 2>/dev/null

      # ── Tracked-secrets guard ──────────────────────────────────────────────
      # Fails the build if a bare .env file or a data payload (csv/db/sqlite/
      # parquet) has been accidentally committed to the repository.
      - name: Tracked-secrets guard
        run: |
          ! git ls-files | grep -E "^\.env$|^data/.*\.(csv|db|sqlite|parquet)$"

  # ── Dedicated gitleaks secret-scan job ─────────────────────────────────────
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    # gitleaks-action reads PR commits via the GitHub API on pull_request runs;
    # without these the API returns 403 "Resource not accessible by integration".
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
