# Pre-commit hooks for climb-graphdb
# Install: pre-commit install
# Run manually: pre-commit run --all-files
#
# Mirrors the CI quality gate (ci.yml) for fast local feedback.
# Exact tool versions should be kept in sync with pyproject.toml.

repos:
  # ── Ruff: lint (with auto-fix) + format ──────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix]
      - id: ruff-format
        name: ruff format

  # ── Mypy: static type checking ────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        name: mypy
        args: [src]
        pass_filenames: false

  # ── Bandit: Python security linting ───────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: bandit
        # B101 skipped: asserts in sync/ are intentional type-narrowing, not security gates.
        args: [-r, src, api, sync, -s, B101]
        pass_filenames: false

  # ── Gitleaks: secret / credential detection ───────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        name: gitleaks

  # ── General hygiene ───────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-yaml
